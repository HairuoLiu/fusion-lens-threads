<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f78166"/>
      <stop offset="1" stop-color="#ffb457"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.35" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#4b9fff"/>
      <stop offset="0.55" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#0b2545"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>

  <!-- lens + thread motif on the right -->
  <g transform="translate(980,220)">
    <!-- thread rings -->
    <g stroke="#30363d" stroke-width="2" fill="none">
      <circle r="185"/><circle r="170"/><circle r="155"/><circle r="140"/>
    </g>
    <!-- helical thread ticks -->
    <g stroke="url(#accent)" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-185" x2="0" y2="-140"/>
      <line x1="131" y1="-131" x2="99" y2="-99"/>
      <line x1="185" y1="0" x2="140" y2="0"/>
      <line x1="131" y1="131" x2="99" y2="99"/>
      <line x1="0" y1="185" x2="0" y2="140"/>
      <line x1="-131" y1="131" x2="-99" y2="99"/>
      <line x1="-185" y1="0" x2="-140" y2="0"/>
      <line x1="-131" y1="-131" x2="-99" y2="-99"/>
    </g>
    <!-- lens glass -->
    <circle r="120" fill="url(#glass)"/>
    <ellipse cx="-38" cy="-42" rx="42" ry="26" fill="#ffffff" opacity="0.28"/>
    <circle r="120" fill="none" stroke="#0b2545" stroke-width="6"/>
  </g>

  <!-- left text block -->
  <g transform="translate(72,150)">
    <text x="0" y="0" fill="#ffffff" font-size="66" font-weight="800" letter-spacing="-1">fusion-lens-threads</text>
    <text x="2" y="52" fill="url(#accent)" font-size="27" font-weight="600">Custom camera-lens &amp; filter threads for Autodesk Fusion 360</text>
    <text x="2" y="104" fill="#8b949e" font-size="21">73 diameters &#183; 0.75 mm &amp; 1.0 mm pitch &#183; macOS + Windows one-click install</text>
    <g transform="translate(2,140)" font-size="18" font-weight="600">
      <rect x="0" y="-26" width="120" height="38" rx="19" fill="#21262d" stroke="#30363d"/>
      <text x="60" y="0" fill="#c9d1d9" text-anchor="middle">MIT License</text>
      <rect x="134" y="-26" width="150" height="38" rx="19" fill="#21262d" stroke="#30363d"/>
      <text x="209" y="0" fill="#c9d1d9" text-anchor="middle">No dependencies</text>
      <rect x="298" y="-26" width="176" height="38" rx="19" fill="#21262d" stroke="#30363d"/>
      <text x="386" y="0" fill="#c9d1d9" text-anchor="middle">M39 / M42 / M52 ...</text>
    </g>
  </g>
</svg>

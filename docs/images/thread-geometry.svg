<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect width="900" height="440" fill="#ffffff"/>
  <text x="30" y="42" fill="#1f2328" font-size="24" font-weight="700">ISO metric 60&#176; thread profile used by this library</text>
  <text x="30" y="70" fill="#57606a" font-size="15">H = (&#8730;3 / 2) &#215; P &#183; pitch dia d2 = d &#8722; 0.75H &#183; minor dia d1 = d &#8722; 1.25H</text>

  <!-- axis -->
  <line x1="70" y1="360" x2="830" y2="360" stroke="#d0d7de" stroke-width="2"/>
  <text x="838" y="365" fill="#8c959f" font-size="13">axis</text>

  <!-- thread zig-zag (60 deg) -->
  <g stroke="#1f6feb" stroke-width="3" fill="none" stroke-linejoin="round">
    <polyline points="90,300 150,150 210,300 270,150 330,300 390,150 450,300 510,150 570,300 630,150 690,300 750,150 810,300"/>
  </g>
  <!-- crest / root reference lines -->
  <line x1="70" y1="150" x2="830" y2="150" stroke="#f78166" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="70" y1="300" x2="830" y2="300" stroke="#2da44e" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="70" y="142" fill="#bc4c00" font-size="13" font-weight="600">major dia (crest) &#8212; d</text>
  <text x="70" y="318" fill="#1a7f37" font-size="13" font-weight="600">minor dia (root) &#8212; d1</text>

  <!-- pitch P dimension -->
  <g stroke="#1f2328" stroke-width="1.5">
    <line x1="150" y1="120" x2="270" y2="120"/>
    <line x1="150" y1="112" x2="150" y2="128"/>
    <line x1="270" y1="112" x2="270" y2="128"/>
  </g>
  <text x="210" y="108" fill="#1f2328" font-size="15" font-weight="700" text-anchor="middle">P (pitch)</text>
  <text x="210" y="392" fill="#57606a" font-size="13" text-anchor="middle">0.75 mm or 1.0 mm</text>

  <!-- 60 degree angle marker -->
  <path d="M 390 150 L 372 195 A 48 48 0 0 0 408 195 Z" fill="#ddf4ff" stroke="#1f6feb" stroke-width="1"/>
  <text x="390" y="205" fill="#0969da" font-size="13" font-weight="700" text-anchor="middle">60&#176;</text>

  <!-- allowance callout -->
  <g transform="translate(560,360)">
    <rect x="0" y="-4" width="270" height="66" rx="8" fill="#fff8c5" stroke="#d4a72c"/>
    <text x="14" y="18" fill="#7d4e00" font-size="13.5" font-weight="700">Fit clearance = 0.10 mm</text>
    <text x="14" y="38" fill="#7d4e00" font-size="12.5">external (lens): shrunk 0.10 mm</text>
    <text x="14" y="55" fill="#7d4e00" font-size="12.5">internal (ring): grown 0.10 mm &#8594; screws together</text>
  </g>
</svg>
